<div class="bg-background antialiased min-h-screen flex items-center justify-center p-md">
    <div class="w-full max-w-[420px]">
        <div
            class="bg-surface-container-lowest border border-surface-variant rounded-xl p-xl flex flex-col gap-xl shadow-sm">
            <div class="flex flex-col items-center text-center gap-sm">
                <div class="h-12 w-12 rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary-container !text-5xl">task_alt</span>
                </div>
                <h1 class="font-display-lg text-display-lg text-on-background">TaskIt</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Accedi al tuo spazio di lavoro sicuro</p>
            </div>
            @if (error()) {
                <div class="bg-error-container/10 border border-error/30 rounded-lg px-md py-sm">
                    <p class="text-error font-label-sm text-label-sm">{{ error() }}</p>
                </div>
            }
            <form class="flex flex-col gap-sm" [formGroup]="form" (ngSubmit)="submit()">
                <div class="flex flex-col gap-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email</label>
                    <ui-text-input
                        formControlName="email"
                        placeholder="Inserisci il tuo indirizzo email"
                        [errorMessage]="emailError()" />
                </div>
                <div class="flex flex-col gap-xs">
                    <div class="flex justify-between items-center">
                        <label class="font-label-sm text-label-sm text-on-surface-variant"
                            for="password">Password</label>
                        <a class="link-primary font-label-sm text-label-sm"
                            routerLink="/forgot-password">Password dimenticata?</a>
                    </div>
                    <ui-password-input
                        formControlName="password"
                        placeholder="••••••••"
                        [errorMessage]="passwordError()" />
                </div>
                <ui-button
                    [disabled]="loading()"
                    [loading]="loading()"
                    text="Accedi"
                    variant="primary"
                    type="submit" />
            </form>
            <div class="flex flex-col gap-md items-center mt-sm">
                <div class="w-full h-px bg-surface-variant relative flex items-center justify-center">
                    <span
                        class="absolute bg-surface-container-lowest px-sm font-label-sm text-label-sm text-outline">oppure</span>
                </div>
                <p class="font-body-sm text-body-sm text-on-surface-variant">
                    Non hai un account? <a
                        class="link-primary font-semibold"
                        routerLink="/register">Registrati</a>
                </p>
            </div>
        </div>
    </div>
</div>
