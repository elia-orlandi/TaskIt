<button
    [class]="'btn-' + variant()"
    [disabled]="disabled()"
    [type]="type()">
    @if (loading()) {
        <span class="material-symbols-outlined animate-spin" style="font-size: 20px;">progress_activity</span>
    } @else if (text()) {
        {{ text() }}
    } @else {
        <ng-content></ng-content>
    }
</button>
