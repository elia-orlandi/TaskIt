<div class="bg-background antialiased min-h-screen flex items-center justify-center p-md">
    <div class="w-full max-w-[420px]">
        <div
            class="bg-surface-container-lowest border border-surface-variant rounded-xl p-xl flex flex-col gap-xl shadow-sm">
            <div class="flex flex-col items-center text-center gap-sm">
                <div class="h-12 w-12 rounded-lg flex items-center justify-center">
                    <span class="material-symbols-outlined text-primary-container !text-5xl">task_alt</span>
                </div>
                <h1 class="font-display-lg text-display-lg text-on-background">TaskFlow</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Crea il tuo account</p>
            </div>
            @if (error()) {
                <div class="bg-error-container/10 border border-error/30 rounded-lg px-md py-sm">
                    <p class="text-error font-label-sm text-label-sm">{{ error() }}</p>
                </div>
            }
            @if (!success()) {
            <form class="flex flex-col gap-sm" [formGroup]="form" (ngSubmit)="submit()">
                <div class="flex flex-col gap-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="name">Nome</label>
                    <input
                        class="input-field"
                        id="name" formControlName="name" placeholder="Inserisci il tuo nome" type="text"
                        [attr.aria-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
                    <span class="form-error-msg" [class.visible]="form.get('name')?.invalid && form.get('name')?.touched">Il nome è obbligatorio</span>
                </div>
                <div class="flex flex-col gap-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email</label>
                    <ui-text-input
                        formControlName="email"
                        placeholder="Inserisci il tuo indirizzo email"
                        [errorMessage]="emailError()" />
                </div>
                <div class="flex flex-col gap-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
                    <ui-password-input
                        formControlName="password"
                        placeholder="Minimo 8 caratteri"
                        [errorMessage]="passwordError()" />
                </div>
                <div class="flex flex-col gap-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="password_confirmation">Conferma Password</label>
                    <ui-password-input
                        formControlName="password_confirmation"
                        placeholder="••••••••"
                        [errorMessage]="confirmPasswordError()" />
                </div>
                <ui-button
                    [disabled]="loading()"
                    [loading]="loading()"
                    text="Registrati"
                    variant="primary"
                    type="submit" />
            </form>
            } @else {
                <div class="border border-primary-container/30 rounded-lg px-md py-md flex flex-col gap-sm">
                    <p class="text-primary-container font-label-sm text-label-sm">{{ success() }}</p>
                    <p class="text-on-surface-variant font-body-sm text-body-sm">
                        Verrai reindirizzato automaticamente tra <span id="countdown">3</span> secondi...
                    </p>
                    <a routerLink="/login" class="font-semibold text-primary-container hover:text-primary cursor-pointer">Vai al login →</a>
                </div>
            }
            <div class="flex flex-col gap-md items-center mt-sm">
                <div class="w-full h-px bg-surface-variant relative flex items-center justify-center">
                    <span
                        class="absolute bg-surface-container-lowest px-sm font-label-sm text-label-sm text-outline">oppure</span>
                </div>
                <p class="font-body-sm text-body-sm text-on-surface-variant">
                    Hai già un account? <a
                        class="link-primary font-semibold"
                        routerLink="/login">Accedi</a>
                </p>
            </div>
        </div>
    </div>
</div>
