<div class="bg-background antialiased min-h-screen flex items-center justify-center p-md">
    <div class="w-full max-w-[420px]">
        <div
            class="bg-surface-container-lowest border border-surface-variant rounded-xl p-xl flex flex-col gap-xl shadow-sm">
            <div class="flex flex-col items-center text-center gap-sm">
                <div class="h-12 w-12 bg-primary-container/10 rounded-lg flex items-center justify-center mb-sm">
                    <span class="material-symbols-outlined text-primary-container"
                        style="font-size: 28px;">mail</span>
                </div>
                <h1 class="font-display-lg text-display-lg text-on-background">Password reset</h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Inserisci la tua email per ricevere il link di reset</p>
            </div>
            @if (error()) {
                <div class="bg-error-container/10 border border-error/30 rounded-lg px-md py-sm">
                    <p class="text-error font-label-sm text-label-sm">{{ error() }}</p>
                </div>
            }
            @if (success()) {
                <div class="bg-primary-container/10 border border-primary-container/30 rounded-lg px-md py-sm">
                    <p class="text-primary-container font-label-sm text-label-sm">{{ success() }}</p>
                </div>
            }
            <form class="flex flex-col gap-sm" [formGroup]="form" (ngSubmit)="submit()">
                <div class="flex flex-col gap-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email</label>
                    <input
                        class="input-field"
                        id="email" formControlName="email" placeholder="email@example.com" type="email"
                        [attr.aria-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
                    <span class="form-error-msg" [class.visible]="form.get('email')?.invalid && form.get('email')?.touched">Inserisci un'email valida</span>
                </div>
                <ui-button
                    [disabled]="loading()"
                    [loading]="loading()"
                    text="Invia link di reset"
                    variant="primary"
                    type="submit" />
            </form>
            <div class="flex flex-col gap-md items-center mt-sm">
                <div class="w-full h-px bg-surface-variant relative flex items-center justify-center">
                    <span
                        class="absolute bg-surface-container-lowest px-sm font-label-sm text-label-sm text-outline">oppure</span>
                </div>
                <p class="font-body-sm text-body-sm text-on-surface-variant">
                    Ricordi la password? <a
                        class="link-primary font-semibold"
                        routerLink="/login">Accedi</a>
                </p>
            </div>
        </div>
    </div>
</div>
